version: '3.8'

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: love-counselor-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: love-counselor-backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/chat_history.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - db_data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: love-counselor-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_storage:
  db_data:
